# Security Policy
# Controls: secrets, dangerous commands, write permissions

version: "1.0.0"
status: active

blocked_patterns:
  secrets:
    - "API_KEY"
    - "SECRET"
    - "PASSWORD"
    - "PRIVATE_KEY"
  commands:
    - "rm -rf"
    - "DROP TABLE"
    - "DELETE FROM"

actions:
  on_secret_found:
    severity: critical
    block: true
    notify: true
  on_dangerous_command:
    severity: critical
    block: true
    notify: true
