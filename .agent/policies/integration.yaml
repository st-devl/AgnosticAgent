# Backend ↔ Frontend Integration Policy
# Script doğrulaması için machine-readable kurallar

version: "2.0.0"
status: active
scope:
  - backend
  - frontend
  - fullstack

# ============================================
# TETİKLEME KOŞULLARI
# ============================================
triggers:
  keywords:
    - api
    - endpoint
    - controller
    - route
    - form
    - modal
    - submit
    - fetch
    - request
    - response
    - entegrasyon
    - contract
    - sözleşme
  
  file_patterns:
    - "*/Controllers/*"
    - "*/routes/*"
    - "*/api/*"
    - "*/components/*"
    - "*/pages/*"
    - "*/views/*"
    - "*/hooks/*"
    - "*/services/*"

# ============================================
# ZORUNLU SÖZLEŞME ALANLARI
# ============================================
contract:
  backend:
    required_fields:
      - operation_name
      - version
      - input_schema
      - output_schema
      - error_schema
      - frontend_binding
      - metadata
    
    validation:
      input_must_have: 
        - field_name
        - type
        - required
        - validation_rules
      
      output_must_have: 
        - success_structure
        - error_structure
      
      metadata_must_have:
        - auth_required
        - permissions
        - idempotent
        - cacheable
  
  frontend:
    required_fields:
      - backend_contract_ref
      - contract_version
      - data_sent
      - data_expected
      - state_flow
      - error_handling
    
    validation:
      must_use_generated_types: true
      no_any_type: true
      no_type_assertion: true

# ============================================
# KONTRAT STANDARTLARI
# ============================================
standards:
  naming:
    operation: "snake_case"  # create_donation
    fields: "snake_case"     # user_email
    errors: "UPPER_SNAKE_CASE"  # VALIDATION_REQUIRED_FIELD
  
  versioning:
    format: "semver"  # MAJOR.MINOR.PATCH
    pattern: "^\\d+\\.\\d+\\.\\d+$"
  
  types:
    allowed:
      - string
      - number
      - boolean
      - object
      - array
      - "null"
    
    forbidden:
      - any
      - unknown
      - mixed

# ============================================
# BREAKING CHANGE POLİCY
# ============================================
# Detaylı liste için bkz: .agent/rules/contract-standards.md
breaking_changes:
  ref: ".agent/rules/contract-standards.md"
  critical: [field_removed, field_type_changed, required_field_added, enum_value_removed, response_structure_changed]
  actions_required: [major_version_bump, migration_guide, deprecation_warning, sunset_date_definition]

# ============================================
# ERROR HANDLING STANDARDI
# ============================================
# Detaylı format için bkz: .agent/rules/error-handling.md
error_handling:
  ref: ".agent/rules/error-handling.md"
  summary:
    required: [code, message]
    optional: [field_errors, metadata]

# ============================================
# LISTE OPERASYONLARı STANDARDI
# ============================================
list_operations:
  pagination:
    required_input:
      - page (default: 1)
      - limit (default: 20, max: 100)
    
    required_output:
      - total
      - page
      - limit
      - total_pages
  
  sorting:
    required_input:
      - sort_by (enum)
      - sort_order (asc/desc)
  
  filtering:
    naming_convention: "filter_{field_name}"

# ============================================
# ADIM SIRASI ZORUNLULUĞU
# ============================================
step_order:
  enforce_for: large_features
  
  steps:
    1:
      name: context_gathering
      description: "Bağlam toplama ve netleştirme"
    
    2:
      name: contract_definition
      description: "Kontrat tanımlama (schema + API + errors)"
    
    3:
      name: contract_validation
      description: "Breaking change ve tutarlılık kontrolü"
    
    4:
      name: backend_implementation
      description: "Backend kodu (kontrata sadık)"
    
    5:
      name: frontend_implementation
      description: "Frontend kodu (generated types kullanarak)"
    
    6:
      name: integration_verification
      description: "Entegrasyon doğrulama ve test senaryoları"
    
    7:
      name: documentation
      description: "Registry, changelog, migration guide"

# ============================================
# DİSİPLİN KURALLARI
# ============================================
rules:
  no_code_without_contract: true
  no_duplicate_structures: true
  no_assumptions: true
  ask_if_missing_info: true
  backend_frontend_separate_never: true
  contract_first_always: true
  generated_types_mandatory: true
  breaking_change_analysis_required: true

# ============================================
# DOĞRULAMA AKSİYONLARI
# ============================================
actions:
  on_violation:
    severity: warning
    block: false
    notify: true
    message: "Entegrasyon sözleşmesi eksik. Bkz: .agent/skills/fullstack-integration/SKILL.md"
  
  on_large_feature:
    require_context_summary: true
    require_step_by_step: true
    suggest_workflow: ".agent/workflows/new-feature.md"
  
  on_breaking_change:
    require_confirmation: true
    suggest_workflow: ".agent/workflows/breaking-change.md"
    force_migration_guide: true
  
  on_contract_update:
    suggest_workflow: ".agent/workflows/contract-update.md"
    require_version_bump: true

# ============================================
# KALİTE KONTROL NOKTALARI
# ============================================
quality_gates:
  pre_commit:
    - contract_complete
    - json_valid
    - naming_convention_followed
    - breaking_change_analyzed
    - error_format_standard
  
  pre_deployment:
    - tests_defined
    - documentation_updated
    - migration_guide_exists_if_breaking
    - registry_updated

# ============================================
# REFERANSLAR
# ============================================


references:
  # Skill ve kurallar
  skill: ".agent/skills/fullstack-integration/SKILL.md"
  contract_template: ".agent/skills/fullstack-integration/contract-template.md"
  contract_standards: ".agent/rules/contract-standards.md"
  error_handling: ".agent/rules/error-handling.md"
  integration_checklist: ".agent/rules/integration-checklist.md"
  
  # Workflows
  new_feature_workflow: ".agent/workflows/new-feature.md"
  contract_update_workflow: ".agent/workflows/contract-update.md"
  breaking_change_workflow: ".agent/workflows/breaking-change.md"
  
  # Registry ve dokümantasyon
  contract_registry: "contracts/registry.json"
  api_docs: "docs/registry.md"  # Opsiyonel - varsa kullanılır
  changelog: "CHANGELOG.md"  # Opsiyonel - varsa kullanılır

# ============================================
# DOSYA ORGANİZASYONU
# ============================================
file_organization:
  contracts:
    path: "contracts/{domain}/{entity}/v{version}/"
    required_files:
      - contract.json
    optional_files:
      - types.generated.*
      - validators.generated.*
      - mocks.generated.json
      - tests.template.*
  
  registry:
    path: "contracts/registry.json"
    update_on:
      - new_contract
      - version_change
      - deprecation
      - breaking_change