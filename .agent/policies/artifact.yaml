# Artifact Management Policy
# Controls artifact lifecycle, versioning, and cleanup

version: "1.0.0"

# Retention Settings
retention:
  max_age_days: 30
  max_size_mb: 100
  cleanup_on_start: false  # Manual trigger preferred

# Versioning
versioning:
  enabled: true
  max_versions: 5
  track_files:
    - "implementation_plan.md"
    - "task.md"
    - "walkthrough.md"

# Archive Policy
archive:
  enabled: true
  archive_after_days: 7
  archive_location: ".agent/state/archive/"

# Cleanup Rules
cleanup:
  orphaned_snapshots: true  # Delete snapshots without parent task
  empty_conversations: true
  max_snapshots_per_task: 10
